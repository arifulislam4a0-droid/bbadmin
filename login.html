<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>এডমিন লগইন</title>
  <style>
    :root {
      --primary: #1f7a46;
      --bg: #f5fff8;
      --card: #fff;
      --border: #dcefe1;
      --text: #14331e
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: system-ui;
      background: linear-gradient(180deg, #f7fff9, #edfff3);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      color: var(--text)
    }

    .card {
      width: min(100%, 430px);
      background: var(--card);
      padding: 22px;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 12px 30px rgba(0, 0, 0, .07)
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 800
    }

    .input {
      width: 100%;
      padding: 14px;
      border: 1px solid #cfe5d6;
      border-radius: 12px;
      font-size: 16px
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 17px;
      font-weight: 800;
      margin-top: 16px
    }

    h1 {
      margin: 0 0 8px
    }

    .sub {
      color: #5f6f65;
      margin: 0 0 14px
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>এডমিন লগইন</h1>
    <p class="sub">ইউজারনেম ও পাসওয়ার্ড দিয়ে ড্যাশবোর্ডে প্রবেশ করুন</p>
    <form id="form">
      <label>ইউজারনেম</label><input class="input" id="username" required>
      <label>পাসওয়ার্ড</label><input class="input" id="password" type="password" required>
      <button class="btn" id="submitBtn" type="submit">লগইন</button>
    </form>
  </div>
  <script>
    const API_BASE = 'https://ss-va1s.onrender.com/api';
    if (localStorage.getItem('adminToken')) location.href = 'index.html';
    form.addEventListener('submit', async (e) => { e.preventDefault(); submitBtn.disabled = true; try { const res = await fetch(`${API_BASE}/admin/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: username.value.trim(), password: password.value }) }); const data = await res.json(); if (!res.ok) throw new Error(data.message || 'লগইন ব্যর্থ'); localStorage.setItem('adminToken', data.token); alert(data.message); location.href = 'index.html'; } catch (err) { alert(err.message) } finally { submitBtn.disabled = false } })
  </script>
</body>

</html>
